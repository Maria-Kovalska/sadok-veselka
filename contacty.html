<!DOCTYPE html>
<html lang="uk">  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Контакти приватного дитячого садка Веселка. Зв'яжіться з нами, щоб дізнатися більше та записати дитину.">
    <title>Садок Веселка — Контакти</title>
    <link href="style/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="img/bear.png">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav>
        <div class="logo">
            <img class="logo-icon" src="img/bear.png" alt="Логотип Садок Веселка">
            <span class="logo-text">Садок Веселка</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Про нас</a>
            <a href="index.html#perevagy">Переваги</a>
            <a href="personal.html">Персонал</a>
            <a href="contacty.html" class="active">Контакти</a>
        </div>
    </nav>

    <main class="flex-grow-1 page-bg">
        <div class="container py-5">
            <div class="row g-4">

                <div class="col-12 col-lg-6">
                    <div class="contact-left">
                        <h1 class="contact-title">Зв`яжіться з нами</h1>

                        <div class="contact-item">
                            <div class="contact-icon">
                                
                                <svg viewBox="0 0 24 24" fill="#000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M19.23 15.26l-2.54-.29a1.99 1.99 0 0 0-1.64.57l-1.84 1.84a15.05 15.05 0 0 1-6.59-6.59l1.85-1.85c.43-.43.64-1.03.57-1.64l-.29-2.52a2.001 2.001 0 0 0-1.99-1.77H5.03c-1.13 0-2.07.94-2 2.07.53 8.54 7.36 15.36 15.89 15.89 1.13.07 2.07-.87 2.07-2v-1.73c.01-1.01-.76-1.86-1.76-1.98z"/>
                                </svg>
                            </div>
                            <div>
                                <h2>Телефон</h2>
                                <p>+380 (00) 000 00 00</p>
                            </div>
                        </div>

                        <div class="contact-item">
                            <div class="contact-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <rect x="2.5" y="5" width="19" height="14" rx="2.5" fill="#ffffff" stroke="#000000" stroke-width="1.4"/>
                                    <path d="M3 6.5l9 6 9-6" stroke="#000000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <div>
                                <h2>Email</h2>
                                <p><a href="mailto:maria@sadok.com">maria@sadok.com</a></p>
                            </div>
                        </div>

                        <div class="contact-item">
                            <div class="contact-icon pin">
                                <svg viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 18 12 18s12-9.6 12-18c0-6.6-5.4-12-12-12z" fill="#E64B4B"/>
                                    <circle cx="12" cy="12" r="4.5" fill="#fff"/>
                                </svg>
                            </div>
                            <div>
                                <h2>Локація</h2>
                                <p>м. Київ<br>м. Одеса</p>
                            </div>
                        </div>

                        <div class="map-block">
                            <img src="img/map.png" alt="Карта розташування">
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-6">
                    <div class="contact-right">
                        <h3>Напишіть нам</h3>
                        <form id="contactForm" action="#" method="GET">
                            <div class="form-group">
                                <label for="name">Ваше ім'я</label>
                                <input type="text" id="name" name="name" placeholder="Наприклад, Марія" required>
                            </div>
                            <div class="form-group">
                                <label for="contact">Ваш email або телефон</label>
                                <input type="text" id="contact" name="contact" placeholder="+380 00 000 00 00" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Повідомлення</label>
                                <textarea id="message" name="message" rows="4" placeholder="Питання, ваші побажання" required></textarea>
                            </div>
                            <button type="submit" class="btn-submit">Відправити →</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="logo">
                <img class="logo-icon" src="img/bear.png" alt="">
                <span class="logo-text">Садок Веселка, 2026</span>
            </div>
            <div class="footer-links">
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
                <a href="#">Telegram</a>
            </div>
            <a class="connection" href="contacty.html">Зв'язатися</a>
        </div>
    </footer>

    <script src="style/bootstrap.bundle.min.js"></script>
    <script>
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(contactForm);
            const data = Object.fromEntries(formData.entries());
            console.log('Дані форми отримано:', data);
            alert('Дякуємо, ' + data.name + '! Ваше повідомлення відправлено (подивіться в консоль).');
            contactForm.reset();
        });
    </script>
</body>
</html>
